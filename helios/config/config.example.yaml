# Helios v6 Configuration — Example
# ============================================================================
# Copy to config/config.yaml and fill in your values.
# All secrets should be set via environment variables or ~/.hermes/.env,
# never in this file.
# ============================================================================

# ─── LLM Bridge ──────────────────────────────────────────────────────────────
llm:
  provider: ollama                     # ollama | openai | deepseek | anthropic
  model: llama3:8b                      # ANY model — swap freely
  api_key: ""                           # Set via HELIOS_LLM_KEY env var
  base_url: "http://localhost:11434/v1" # Your local or remote LLM endpoint
  max_tokens: 2048
  timeout: 30
  daily_cap: 20

# ─── Matrix Integration ────────────────────────────────────────────────────
# All push delivery routes through matrix_pusher.py.
matrix:
  enabled: true
  homeserver: "https://matrix.example.org"
  access_token: ""  # Set via MATRIX_ACCESS_TOKEN env var
  room: ""           # e.g. "!roomid:example.org"
  dm_user: ""        # e.g. "@user:example.org"
  alerts:
    min_priority_to_post: 1
    min_priority_to_dm: 2
  formatting:
    color_map:
      morning: 0x3498DB
      evening: 0x2ECC71
      interrupt: 0xE74C3C
      patterns: 0x9B59B6

# ─── Discord Integration (disabled — replaced by Matrix) ────────────────────
discord:
  enabled: false
  dm:
    channel_id: ""
  channels:
    helios:
      id: ""

# ─── Channel Adapter System ───────────────────────────────────────────────
# Normalized outbound delivery.
channels:
  matrix:
    enabled: true
    # Matrix config inherited from the top-level matrix: section.
  log:
    enabled: true
    jsonl_path: "~/.hermes/helios/data/channel_log.jsonl"
    log_level: "info"
    max_jsonl_lines: 10000

# ─── Modules ────────────────────────────────────────────────────────────────
modules:
  location:
    enabled: true
  calendar:
    enabled: true
    ha_enabled: true
    ha_base_url: "http://homeassistant.local:8123"
    ha_calendars:
      - calendar.personal
      - calendar.holidays
      - calendar.birthdays
    fallback_enabled: true
  contacts:
    enabled: true
  reminders:
    enabled: true
  notes:
    enabled: true
  weather:
    enabled: true
  health:
    enabled: true
  nutrition:
    enabled: true
    calorie_target: 2000
    protein_target: 160
  spotify:
    enabled: true
  mood:
    enabled: true
  focus:
    enabled: true
  work_hours:
    enabled: true
    timezone: "America/Edmonton"
    anchor_start: "2026-01-01"
    period_days: 14
    fixed_start: "07:00"
    start_mode: "fixed"
    end_rounding: "floor"
    round_minutes: 30
    notify_enabled: true
    notify_hour: 17
  briefing:
    enabled: true
  tasks:
    enabled: true
    ha_enabled: true
    ha_base_url: "http://homeassistant.local:8123"
    ha_todos:
      - todo.my_tasks
    fallback_enabled: true
  home:
    enabled: true
    ha_enabled: true
    ha_base_url: "http://homeassistant.local:8123"
    rooms:  # entity_id → physical room mapping (edit here, no code changes)
      bedroom:
        motion: ["binary_sensor.bedroom_motion"]
        illuminance: ["sensor.bedroom_illuminance"]
        temperature: ["sensor.bedroom_temperature"]
        lights:
          - light.bedroom
      office:
        motion: ["binary_sensor.office_motion"]
        illuminance: ["sensor.office_illuminance"]
        temperature: ["sensor.office_temperature"]
        lights:
          - light.desk_lamp
          - light.ceiling
  system:
    enabled: true
  server:
    enabled: true

# ─── Home Assistant Integration ───────────────────────────────────────────────
home_assistant:
  enabled: true
  base_url: "http://homeassistant.local:8123"
  # Token loaded from HASS_TOKEN env var
  health_prefix: "hae.healthsync_"
  health_timeout: 15
  health_stale_hours: 12
  calendars:
    enabled: true
    entities:
      - calendar.personal
      - calendar.holidays
  todo:
    enabled: true
    entities:
      - todo.my_tasks
  fallbacks:
    calendar:
      enabled: true
      fallback_to: pyicloud

# ─── Dream Engine (autoDream memory consolidation) ──────────────────────────
dream_engine:
  idle_threshold_secs: 600       # 10 min AFK before dreaming
  dream_interval_secs: 3600      # min time between dream cycles
  retention_metric_days: 90      # keep metric_snapshots for 90 days
  retention_focus_days: 30       # keep focus rows for 30 days
  anomaly_stddev: 2.0            # z-score threshold for anomaly detection
  anomaly_min_baseline: 7        # need at least 7 days for baseline

# ─── Priority Engine (candidate ranking) ──────────────────────────────────
# Modes: shadow | soft_control | priority_dispatch
priority:
  enabled: true
  mode: shadow
  fail_open: true
  log_all_candidates: true
  export_debug: true

  selector:
    max_selected_per_tick: 5
    max_notify_per_tick: 2
    max_dm_per_tick: 1
    max_per_category_per_tick: 1

  scoring:
    weights:
      urgency: 1.35
      importance: 1.25
      relevance: 1.10
      confidence: 1.00
      context_fit: 0.95
      actionability: 0.90
      novelty: 0.50
      safety: 1.50
      disruption_cost: 1.20
      staleness: 0.80
      annoyance: 1.10
      redundancy: 1.15
    thresholds:
      dm: 0.86
      notify: 0.70
      summary: 0.45
      log_only: 0.20

  sources:
    rules: true
    home: true
    module_health: true
    predictive: false
    proactive: false
    daily_intelligence: false
    llm_requests: false

  safeguards:
    never_suppress_critical: true
    never_block_self_healing: true
    never_block_user_requested_reminders: true
    quiet_hours_penalty: 0.25
    driving_penalty: 0.35
    meeting_penalty: 0.30

  summarizer:
    enabled: false
    discord_enabled: false
    hour: 21
    window_hours: 24

  soft_control:
    enabled: false

# ─── Self-Improvement Loop ─────────────────────────────────────────────────
self_improvement:
  enabled: true
  mode: shadow          # shadow | apprentice | active
  min_evidence_count: 3
  max_negative_rate: 0.35
  proposal_interval_minutes: 60
  export_enabled: true
  allow_active_promotion: false