# Helios v6 Example Configuration
# ============================================================================
# Copy this to config.yaml and customize for your environment.
# No secrets should be stored here — use environment variables or ~/.hermes/.env
# ============================================================================

# ─── LLM Bridge ──────────────────────────────────────────────────────────────
llm:
  provider: deepseek
  model: deepseek-v4-flash:cloud
  api_key: ""  # Set via HELIOS_LLM_API_KEY env var
  base_url: "http://localhost:11434/v1"
  max_tokens: 2048
  timeout: 30
  daily_cap: 20

# ─── Matrix Integration ────────────────────────────────────────────────────
matrix:
  enabled: true
  homeserver: "https://matrix.example.org"
  access_token: ""  # Set via MATRIX_ACCESS_TOKEN env var
  room: "!roomid:matrix.example.org"
  dm_user: "@user:matrix.example.org"
  alerts:
    min_priority_to_post: 1
    min_priority_to_dm: 2
  formatting:
    color_map:
      morning: 0x3498DB
      evening: 0x2ECC71
      interrupt: 0xE74C3C
      patterns: 0x9B59B6

# ─── Channel Adapter System ───────────────────────────────────────────────
channels:
  matrix:
    enabled: true
  log:
    enabled: true
    jsonl_path: "~/.hermes/helios/data/channel_log.jsonl"
    log_level: "info"
    max_jsonl_lines: 10000

# ─── Modules ────────────────────────────────────────────────────────────────
modules:
  location:
    enabled: true
  calendar:
    enabled: true
    ha_enabled: false
    ha_base_url: "http://homeassistant.local:8123"
    ha_calendars: []
    fallback_enabled: true
  contacts:
    enabled: true
  reminders:
    enabled: true
  notes:
    enabled: true
  weather:
    enabled: true
  health:
    enabled: true
  phone_sensors:
    enabled: true
    api_url: "http://127.0.0.1:8899"
    timeout: 10
  nutrition:
    enabled: true
    calorie_target: 2000
    protein_target: 160
  spotify:
    enabled: true
  mood:
    enabled: true
  focus:
    enabled: true
  work_hours:
    enabled: true
    timezone: "America/Edmonton"
    anchor_start: "2026-05-11"
    period_days: 14
    fixed_start: "07:00"
    start_mode: "fixed"
    end_rounding: "floor"
    round_minutes: 30
    notify_enabled: true
    notify_hour: 17
  briefing:
    enabled: true
  tasks:
    enabled: true
    ha_enabled: false
    ha_base_url: "http://homeassistant.local:8123"
    ha_todos: []
    fallback_enabled: true
  home:
    enabled: true
    ha_enabled: false
    ha_base_url: "http://homeassistant.local:8123"
    rooms: {}
  system:
    enabled: true
  server:
    enabled: true
  subscriptions:
    enabled: true
    alert_days_before: 3  # Number of days before renewal to send an alert
    # No additional configuration needed — subscriptions are auto-detected
    # from Gmail signals. Manual entries can be added via context API.

# ─── Home Assistant Integration ───────────────────────────────────────────────
home_assistant:
  enabled: false
  base_url: "http://homeassistant.local:8123"
  # Token is loaded from ~/.hermes/.env HASS_TOKEN at runtime
  health_prefix: ""
  health_timeout: 15
  health_stale_hours: 12

# ─── Dream Engine ──────────────────────────────────────────────────────────
dream_engine:
  idle_threshold_secs: 600
  dream_interval_secs: 3600
  retention_metric_days: 90
  retention_focus_days: 30
  anomaly_stddev: 2.0
  anomaly_min_baseline: 7

# ─── Priority Engine ──────────────────────────────────────────────────────
priority:
  enabled: true
  mode: shadow
  fail_open: true
  log_all_candidates: true
  export_debug: true
  selector:
    max_selected_per_tick: 5
    max_notify_per_tick: 2
    max_dm_per_tick: 1
    max_per_category_per_tick: 1
  scoring:
    weights:
      urgency: 1.35
      importance: 1.25
      relevance: 1.10
      confidence: 1.00
      context_fit: 0.95
      actionability: 0.90
      novelty: 0.50
      safety: 1.50
      disruption_cost: 1.20
      staleness: 0.80
      annoyance: 1.10
      redundancy: 1.15
    thresholds:
      dm: 0.86
      notify: 0.70
      summary: 0.45
      log_only: 0.20

# ─── Self-Improvement ─────────────────────────────────────────────────────
self_improvement:
  enabled: true
  mode: shadow
  min_evidence_count: 3
  max_negative_rate: 0.35
  proposal_interval_minutes: 60
  export_enabled: true
  allow_active_promotion: false